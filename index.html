<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saif Chat | Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

        :root { --primary-blue: #3b82f6; --dark-bg: #09090b; }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg); 
            color: #f4f4f5; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            margin: 0;
        }

        .glass-card { 
            background: rgba(24, 24, 27, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .user-bubble { 
            background: linear-gradient(135deg, #2563eb, #3b82f6); 
            border-radius: 18px 18px 4px 18px; 
        }

        .ai-bubble { 
            background: #18181b; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px 18px 18px 4px; 
        }

        .nav-tab { transition: all 0.3s ease; border-bottom: 2px solid transparent; }
        .nav-tab.active { color: var(--primary-blue); border-bottom-color: var(--primary-blue); background: rgba(59, 130, 246, 0.1); }

        #fileInput { display: none; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }

        .preview-img-container { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
        .preview-img-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid var(--primary-blue); }

        /* تجاوُب الموبايل */
        @media (max-width: 1024px) {
            aside { display: none !important; }
            main { flex: 1 1 auto; min-width: 0; }
            #mainInput { min-height: 40px; max-height: 150px; }
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row w-full">

    <!-- Sidebar (Desktop Only) -->
    <aside class="w-80 hidden lg:flex flex-col p-6 border-l border-white/5 bg-[#0c0c0e]">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black text-white leading-none">Saif Chat</h1>
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">Elite Edition</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="p-4 rounded-2xl bg-white/5 border border-white/10 text-sm text-gray-400">
                <p class="font-bold text-white mb-2">كيف تعمل؟</p>
                اختر "إنشاء صورة" لرفع صورتك وتعديلها فوراً، أو "التحدث" للدردشة العادية مع الذكاء الاصطناعي.
            </div>
        </div>

        <div class="mt-auto p-4 glass-card rounded-2xl border-blue-500/20">
            <p class="text-[10px] text-gray-500 text-center uppercase tracking-tighter">Powered by Gemini 2.5 Flash</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative h-full">
        <!-- Top Navigation -->
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-4 md:px-8 glass-card z-30">
            <div class="flex gap-2 h-full items-center">
                <button onclick="setMode('chat')" id="chatModeBtn" class="nav-tab active px-4 md:px-6 h-full flex items-center gap-2 font-bold text-sm">
                    <i class="fas fa-comment-dots"></i> التحدث
                </button>
                <button onclick="setMode('image')" id="imageModeBtn" class="nav-tab px-4 md:px-6 h-full flex items-center gap-2 font-bold text-sm">
                    <i class="fas fa-magic"></i> إنشاء صورة
                </button>
            </div>
            
            <div class="relative">
                <button id="menuBtn" class="w-10 h-10 rounded-full hover:bg-white/5 flex items-center justify-center text-gray-400">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
                <div id="dropdown" class="hidden absolute left-0 mt-2 w-48 glass-card rounded-2xl shadow-2xl z-50 overflow-hidden border border-white/10">
                    <button onclick="toggleModal(true)" class="w-full text-right px-5 py-4 text-sm hover:bg-blue-600 transition border-b border-white/5">
                        <i class="fas fa-user-plus ml-3 text-blue-400"></i> تسجيل الدخول
                    </button>
                    <button onclick="alert('تم التطوير والصنع بواسطة سيف علاء')" class="w-full text-right px-5 py-4 text-sm hover:bg-white/5 transition border-b border-white/5">
                        <i class="fas fa-info-circle ml-3 text-yellow-400"></i> حول
                    </button>
                    <button onclick="location.reload()" class="w-full text-right px-5 py-4 text-sm hover:bg-white/5 transition">
                        <i class="fas fa-trash-alt ml-3 text-red-400"></i> مسح المحادثة
                    </button>
                </div>
            </div>
        </header>

        <!-- Messages Area -->
        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 chat-scroll pb-44">
            <div id="welcomeMsg" class="flex flex-col items-center justify-center h-full text-center opacity-50">
                <i class="fas fa-terminal text-6xl mb-6 text-blue-500/20"></i>
                <h2 class="text-2xl font-bold">مرحباً بك في Saif Chat</h2>
                <p class="text-sm mt-2">اختر النمط المفضل لديك من الأعلى وابدأ الآن.</p>
            </div>
        </div>

        <!-- Dynamic Input Bar -->
        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-8 bg-gradient-to-t from-black via-black/80 to-transparent z-20">
            <div class="max-w-4xl mx-auto">
                
                <!-- Image Queue Preview -->
                <div id="imageQueue" class="hidden flex gap-3 overflow-x-auto pb-4 mb-2 scroll-smooth"></div>

                <div class="glass-card rounded-[2.5rem] p-2 flex items-end gap-2 border border-white/10 shadow-2xl">
                    <div id="imageUploadBtn">
                        <button onclick="document.getElementById('fileInput').click()" class="w-14 h-14 rounded-full flex items-center justify-center text-gray-400 hover:text-blue-400 transition hover:bg-white/5">
                            <i class="fas fa-camera-retro text-xl"></i>
                        </button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" multiple>
                    
                    <textarea id="mainInput" rows="1" class="flex-1 bg-transparent border-none focus:ring-0 text-white p-4 resize-none placeholder-gray-600 text-sm md:text-base" placeholder="اكتب رسالتك أو وصف الصورة..."></textarea>
                    
                    <button id="sendBtn" class="m-1 w-14 h-14 rounded-[1.8rem] bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center transition shadow-lg shadow-blue-600/30 active:scale-95">
                        <i class="fas fa-paper-plane text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="glass-card w-full max-w-md p-8 rounded-[2rem] border border-white/10 shadow-2xl relative">
            <button onclick="toggleModal(false)" class="absolute top-6 left-6 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 class="text-2xl font-black mb-2">انضم إلينا</h3>
            <p class="text-xs text-gray-500 mb-8">سيتم إرسال بياناتك بأمان إلى فريق Saif Chat.</p>
            
            <form id="loginForm" class="space-y-4">
                <input type="text" id="userName" placeholder="الاسم الكامل" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition">
                <input type="tel" id="userPhone" placeholder="رقم الهاتف" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition">
                <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-600/20 mt-4">إرسال البيانات</button>
            </form>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const chatContainer = document.getElementById('chatContainer');
        const mainInput = document.getElementById('mainInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const imageQueue = document.getElementById('imageQueue');
        const menuBtn = document.getElementById('menuBtn');
        const dropdown = document.getElementById('dropdown');
        
        let currentMode = 'chat';
        let selectedImages = [];

        menuBtn.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); };
        document.onclick = () => dropdown.classList.add('hidden');

        function toggleModal(show) { document.getElementById('loginModal').classList.toggle('active', show); dropdown.classList.add('hidden'); }
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('chatModeBtn').classList.toggle('active', mode === 'chat');
            document.getElementById('imageModeBtn').classList.toggle('active', mode === 'image');
            mainInput.placeholder = mode === 'image' ? "صف الصورة التي تريد إنشائها أو تعديلها..." : "اكتب رسالتك للتحدث مع الذكاء الاصطناعي...";
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                email: document.getElementById('userEmail').value
            };
            console.log("Sending data to aa7183954@gmail.com:", data);
            alert("تم إرسال بياناتك بنجاح!");
            toggleModal(false);
        };

        fileInput.onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedImages.push({ base64: ev.target.result.split(',')[1], url: ev.target.result });
                    renderQueue();
                };
                reader.readAsDataURL(file);
            });
        };

        function renderQueue() {
            imageQueue.classList.toggle('hidden', selectedImages.length === 0);
            imageQueue.innerHTML = selectedImages.map((img, i) => `
                <div class="preview-img-container">
                    <img src="${img.url}">
                    <button onclick="removeImg(${i})" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] border-2 border-[#09090b]">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }
        window.removeImg = (i) => { selectedImages.splice(i, 1); renderQueue(); };

        async function handleSend() {
            const prompt = mainInput.value.trim();
            if (!prompt && selectedImages.length === 0) return;

            const imgs = [...selectedImages];
            appendMessage('user', prompt);
            if(imgs.length > 0) appendMessage('user', imgs.map(i => i.url), 'grid');

            mainInput.value = '';
            mainInput.style.height = 'auto';
            selectedImages = [];
            renderQueue();

            const loader = document.createElement('div');
            loader.className = "flex items-center gap-3 text-xs text-gray-500 p-4 animate-pulse";
            loader.innerHTML = `<i class="fas fa-circle-notch animate-spin text-blue-500"></i> جاري المعالجة بنمط ${currentMode === 'chat' ? 'الدردشة' : 'إنشاء الصور'}...`;
            chatContainer.appendChild(loader);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });

            setTimeout(() => { loader.remove(); appendMessage('ai', "هنا ستظهر الرسالة أو الصورة بعد المعالجة (API Key فارغ حالياً)"); }, 1500);
        }

        function appendMessage(role, content, type = 'text') {
            if(document.getElementById('welcomeMsg')) document.getElementById('welcomeMsg').remove();
            const msg = document.createElement('div');
            msg.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in mb-6`;

            let html = '';
            if (type === 'grid') {
                html = `<div class="grid grid-cols-2 gap-3">${content.map(c => `<img src="${c}" class="rounded-xl w-full shadow-md">`).join('')}</div>`;
            } else if (type === 'image') {
                html = `<div class="space-y-3">
                            <p class="text-xs text-blue-400 font-bold"><i class="fas fa-check-circle"></i> تم توليد الصورة بنجاح</p>
                            <img src="${content}" class="rounded-2xl w-full shadow-2xl border border-white/10">
                        </div>`;
            } else {
                html = `<p class="text-sm md:text-base leading-relaxed whitespace-pre-wrap">${content}</p>`;
            }

            msg.innerHTML = `<div class="max-w-[85%] md:max-w-[75%] p-5 ${role === 'user' ? 'user-bubble' : 'ai-bubble'} text-white shadow-2xl">${html}</div>`;
            chatContainer.appendChild(msg);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        sendBtn.onclick = handleSend;
        mainInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        mainInput.oninput = function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; };
    </script>
</body>
                        </html>
